<!DOCTYPE html>
<html>
<head>
    <title>Smart Resource Allocation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Resource Allocation System</h1>

<h2>Add Volunteer</h2>
<input id="vname" placeholder="Name">
<input id="vskill" placeholder="Skill (medical/logistics)">
<button onclick="addVolunteer()">Add Volunteer</button>

<h2>Add Task</h2>
<input id="tname" placeholder="Task">
<input id="tskill" placeholder="Required Skill">
<select id="tpriority">
    <option>High</option>
    <option>Medium</option>
    <option>Low</option>
</select>
<button onclick="addTask()">Add Task</button>

<h2>Actions</h2>
<button onclick="autoAssign()">Auto Assign</button>

<h2>System Data</h2>
<pre id="output"></pre>

<script src="script.js"></script>
</body>
</html>
